<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Fixture</title>
    <style>body{font:16px sans-serif;padding:40px}button,input{padding:8px;font-size:16px}</style>
  </head>
  <body>
    <h1 id="title">Hello</h1>
    <input id="name" placeholder="Your name" />
    <button id="submit">Create</button>
    <p id="result"></p>
    <script>
      document.getElementById("submit").addEventListener("click", () => {
        const v = document.getElementById("name").value
        document.getElementById("result").textContent = "Created: " + v
      })
    </script>
  </body>
</html>
